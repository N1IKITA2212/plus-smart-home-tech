spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true

      routes:
        - id: shopping_cart_service_route
          uri: lb://shopping-cart

          predicates:
            - Path=/shopping-cart/**

          filters:
            - PrefixPath=/api/v1



        - id: shopping_store_service_route
          uri: lb://shopping-store

          predicates:
            - Path=/shopping-store/**

          filters:
            - PrefixPath=/api/v1
            - name: Retry
              args:
                retries: 3
                statuses: NOT_FOUND
                methods: GET
                backoff:
                  firstBackoff: 50ms
                  maxBackoff: 500ms
                  factor: 2
                  basedOnPreviousValue: false



        - id: order_service_route
          uri: lb://order

          predicates:
            - Path=/order/**

          filters:
            - PrefixPath=/api/v1



        - id: payment_service_route
          uri: lb://payment

          predicates:
            - Path=/payment/**

          filters:
            - PrefixPath=/api/v1



        - id: delivery_route
          uri: lb://delivery

          predicates:
            - Path=/delivery/**

          filters:
            - PrefixPath=/api/v1