server.port=0

spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/commerce_delivery
spring.datasource.username=username
spring.datasource.password=password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

delivery.cost.base-rate=5.0
delivery.cost.address1-multiplier=1.0
delivery.cost.address2-multiplier=2.0
delivery.cost.fragile-multiplier=0.2
delivery.cost.weight-multiplier=0.3
delivery.cost.volume-multiplier=0.2
delivery.cost.address-multiplier=0.2
