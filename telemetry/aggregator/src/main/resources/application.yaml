spring:
  application:
    name: aggregator
  config:
    import: "optional:configserver:http://localhost:8888"
  cloud:
    config:
      fail-fast: false
      retry:
        use-random-policy: true
        max-interval: 6000
      discovery:
        enabled: false
        service-id: config-server
    eureka:
      client:
        serviceUrl:
          defaultZone: http://localhost:8761/eureka/
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: ru.yandex.practicum.kafka.serializer.GeneralAvroSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: ru.yandex.practicum.kafka.deserializer.SensorEventDeserializer
      group-id: sensorEvent.group.id
      client-id: SensorEventConsumer
      enable-auto-commit: false
      auto-offset-reset: earliest

aggregator:
  topic:
    telemetry-snapshots: telemetry.snapshots.v1

topic:
  telemetry:
    sensors-topic: telemetry.sensors.v1
