spring:
  application:
    name: analyzer
  config:
    import: "optional:configserver:http://localhost:8888"
  cloud:
    config:
      fail-fast: false
      retry:
        use-random-policy: true
        max-interval: 6000
      discovery:
        enabled: false
        service-id: config-server
    eureka:
      client:
        serviceUrl:
          defaultZone: http://localhost:8761/eureka/