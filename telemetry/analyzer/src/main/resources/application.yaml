spring:
  application:
    name: analyzer
  config:
    import: "optional:configserver:http://localhost:8888"
  cloud:
    config:
      fail-fast: false
      retry:
        use-random-policy: true
        max-interval: 6000
      discovery:
        enabled: false
        service-id: config-server
    eureka:
      client:
        serviceUrl:
          defaultZone: http://localhost:8761/eureka/
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      hub:
        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: ru.yandex.practicum.kafka.deserializer.HubEventDeserializer
        group-id: hubEvent.group.id
        client-id: HubEventConsumer
        auto-offset-reset: earliest
        enable-auto-commit: false
      snapshots:
        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: ru.yandex.practicum.kafka.deserializer.SensorsSnapshotDeserializer
        group-id: snapshot.group.id
        client-id: SnapshotsConsumer
        auto-offset-reset: earliest
        enable-auto-commit: false
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show_sql: false
  sql:
    init:
      mode: always
  datasource:
    driverClassName: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: username
    password: password

analyzer:
  topic:
    snapshots-topic: telemetry.snapshots.v1
    hub-event-topic: telemetry.hubs.v1

grpc:
  client:
    hub-router:
      address: static://localhost:59090
      enableKeepAlive: true
      keepAliveWithoutCalls: true
      negotiationType: plaintext

logging:
  level:
    ru.yandex.practicum: DEBUG
